# Local development stack for PostgreSQL, FastAPI, and Next.js services.
services:
  db:
    # PostgreSQL stores application data and is exposed locally for inspection.
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    # The backend service serves APIs, handles auth, and runs the scheduler.
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ENVIRONMENT: ${ENVIRONMENT}
      AUTH_TOKEN_TTL_HOURS: ${AUTH_TOKEN_TTL_HOURS}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME}
      SECURE_COOKIES: ${SECURE_COOKIES}
      PASSWORD_MIN_LENGTH: ${PASSWORD_MIN_LENGTH}
      CORS_ORIGINS: ${CORS_ORIGINS}
      REGISTRATION_RATE_LIMIT_ATTEMPTS: ${REGISTRATION_RATE_LIMIT_ATTEMPTS}
      REGISTRATION_RATE_LIMIT_WINDOW_SECONDS: ${REGISTRATION_RATE_LIMIT_WINDOW_SECONDS}
      LOGIN_RATE_LIMIT_ATTEMPTS: ${LOGIN_RATE_LIMIT_ATTEMPTS}
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command: uvicorn --app-dir /app app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    # The frontend service serves the browser UI during development.
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      API_PROXY_TARGET: ${FRONTEND_DOCKER_API_PROXY_TARGET}
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  # Named volume keeps PostgreSQL data across normal restarts.
  postgres_data:
